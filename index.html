<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="theme-color" content="#0A0D14">
<title>Mon Programme Sport</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A0D14;--card:#111520;--card2:#161C2A;--border:#1E2740;--red:#FF3B5C;--orange:#FF8C42;--green:#30D158;--blue:#0A84FF;--purple:#BF5AF2;--yellow:#FFD60A;--teal:#5AC8FA;--txt:#E8ECF4;--dim:#8B95A8;--dim2:#4A5568;--radius:16px;--radius-sm:10px;}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
button,input,select{font-family:inherit;-webkit-tap-highlight-color:transparent;border:none;outline:none}
::-webkit-scrollbar{display:none}
@supports(padding:max(0px)){.safe-bot{padding-bottom:max(20px,env(safe-area-inset-bottom))}.safe-top{padding-top:max(14px,env(safe-area-inset-top))}}
.app{display:flex;flex-direction:column;height:100%;overflow:hidden}
.nav{flex-shrink:0;display:flex;background:var(--card);border-bottom:1px solid var(--border)}
.nav-btn{flex:1;padding:14px 6px 10px;background:none;color:var(--dim);font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;transition:color .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.nav-btn .icon{font-size:20px}
.nav-btn.active{color:var(--red)}
.nav-btn.active .icon{filter:drop-shadow(0 0 6px var(--red))}
.page{flex:1;overflow-y:auto;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--dim)}
.days-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
.day-pill{flex-shrink:0;padding:8px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;color:var(--dim);cursor:pointer;transition:all .2s;white-space:nowrap}
.day-pill.active{border-color:var(--red);color:var(--red);background:rgba(255,59,92,.1)}
.day-pill.today{border-color:var(--blue)}
.day-pill.done-day{border-color:var(--green);color:var(--green)}
.progress-ring-container{position:relative;width:100px;height:100px;flex-shrink:0}
.progress-ring-container svg{transform:rotate(-90deg)}
.progress-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.progress-pct{font-size:26px;font-weight:900}
.progress-sub{font-size:9px;color:var(--dim);font-weight:600}
.exercise-block{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden}
.exercise-header{display:flex;align-items:center;gap:10px;padding:12px 14px}
.muscle-badge{font-size:9px;font-weight:800;letter-spacing:.4px;padding:3px 7px;border-radius:6px;white-space:nowrap}
.exercise-name-wrap{flex:1;min-width:0}
.exercise-title{font-size:13px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exercise-cals{font-size:10px;color:var(--orange);font-weight:600}
.expand-btn{background:none;color:var(--dim);font-size:18px;padding:4px 8px;cursor:pointer;transition:transform .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center;min-width:36px;min-height:36px}
.expand-btn.open{transform:rotate(180deg)}
.variant-wrap{padding:0 14px 12px}
.variant-label{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.variant-select{width:100%;background:var(--bg);color:var(--txt);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-weight:600;cursor:pointer;appearance:none;-webkit-appearance:none}
.variant-select:focus{border-color:var(--red)}
.week-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--purple);font-weight:700;margin-top:6px}
.series-section{padding:0 14px 14px}
.series-label{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.series-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.serie-num{font-size:11px;color:var(--dim);font-weight:700;width:20px;text-align:center}
.serie-input-wrap{display:flex;gap:6px;flex:1}
.serie-input{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--txt);font-size:13px;font-weight:600;padding:8px 10px;width:100%;text-align:center}
.serie-input:focus{border-color:var(--red)}
.serie-check{width:36px;height:36px;border-radius:8px;background:var(--bg);border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0}
.serie-check.done{background:var(--green);border-color:var(--green)}
.series-controls{display:flex;gap:6px;margin-top:8px}
.ctrl-btn{flex:1;padding:12px 8px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--dim);font-size:13px;font-weight:800;cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:center}
.ctrl-btn.add{color:var(--green);border-color:rgba(48,209,88,.3);background:rgba(48,209,88,.06)}
.ctrl-btn.rm{color:var(--red);border-color:rgba(255,59,92,.3);background:rgba(255,59,92,.06)}
.add-ex-panel{background:rgba(191,90,242,.06);border:1.5px dashed rgba(191,90,242,.3);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px}
.add-ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stats-row{display:flex;gap:8px;margin-bottom:12px}
.stat-card{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-val{font-size:18px;font-weight:900}
.stat-lbl{font-size:9px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
/* TIMER OVERLAY */
.timer-overlay{position:fixed;inset:0;background:#0A0D14;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.timer-overlay-display{font-size:96px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-2px;line-height:1}
.timer-overlay-display.running{color:var(--orange)}
.timer-overlay-display.done{color:var(--green)}
.timer-overlay-label{font-size:14px;font-weight:700;color:var(--dim);letter-spacing:.5px;text-transform:uppercase}
.timer-overlay-arc{position:relative;width:260px;height:260px;margin-bottom:8px}
.timer-overlay-arc svg{position:absolute;inset:0;transform:rotate(-90deg)}
.timer-overlay-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.timer-btns-row{display:flex;gap:12px;align-items:center}
.timer-big-btn{padding:16px 32px;border-radius:16px;font-size:16px;font-weight:800;cursor:pointer;border:none;min-width:80px}
.timer-small-btn{width:52px;height:52px;border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;background:var(--card2);border:1.5px solid var(--border);color:var(--dim);display:flex;align-items:center;justify-content:center}
/* inline timer bar */
.timer-card{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px}
.timer-display{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;flex:1;cursor:pointer}
.timer-display.running{color:var(--orange)}
.timer-inline-btn{min-width:44px;min-height:44px;border-radius:10px;background:var(--bg);border:1.5px solid var(--border);color:var(--txt);font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 10px}
.run-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800}
.badge-green{background:rgba(48,209,88,.15);color:var(--green)}
.badge-orange{background:rgba(255,140,66,.15);color:var(--orange)}
.section-title{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1E2740;border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;z-index:9998;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.rest-day{text-align:center;padding:50px 20px}
.rest-day .icon{font-size:64px;margin-bottom:16px}
.rest-day h2{font-size:24px;font-weight:900;margin-bottom:8px}
.rest-day p{color:var(--dim);font-size:14px;line-height:1.5}
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:var(--border);outline:none;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--red);border:2px solid var(--bg);cursor:pointer}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.month-cell{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.month-cell.rest{background:rgba(139,149,168,.08);color:var(--dim2)}
.month-cell.done{background:rgba(48,209,88,.2);color:var(--green)}
.month-cell.partial{background:rgba(255,140,66,.2);color:var(--orange)}
.month-cell.missed{background:rgba(255,59,92,.12);color:var(--red)}
.month-cell.future{background:var(--card2);color:var(--dim2)}
/* image modal */
.img-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:10000;display:flex;flex-direction:column;overflow:hidden}
.img-modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;flex-shrink:0}
.img-modal-title{font-size:15px;font-weight:900;color:var(--txt);flex:1;padding-right:12px;line-height:1.3}
.img-modal-close{width:36px;height:36px;border-radius:10px;background:var(--card2);border:1px solid var(--border);color:var(--dim);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.img-modal-body{flex:1;overflow-y:auto;padding:0 16px 24px}
.img-slide-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scroll-snap-type:x mandatory}
.img-slide{flex-shrink:0;width:calc(100vw - 52px);scroll-snap-align:start;border-radius:14px;overflow:hidden;background:var(--card2);border:1px solid var(--border);position:relative}
.img-slide img{width:100%;display:block;min-height:200px;object-fit:cover;background:var(--card2)}
.img-slide-label{padding:10px 12px;font-size:12px;font-weight:700;color:var(--dim)}
.img-dot-row{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.img-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .2s}
.img-dot.active{background:var(--red)}
.img-tip-box{background:rgba(10,132,255,.08);border:1px solid rgba(10,132,255,.15);border-radius:12px;padding:14px;margin-bottom:16px}
.img-tip-title{font-size:11px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.img-tip-text{font-size:13px;color:var(--txt);line-height:1.6}
.img-muscles-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.img-muscle-chip{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700}
.img-yt-btn{width:100%;padding:14px;border-radius:12px;background:rgba(255,59,92,.12);border:1.5px solid rgba(255,59,92,.3);color:var(--red);font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;margin-bottom:8px}
.img-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:var(--dim);font-size:13px;font-weight:700}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.photo-btn{width:32px;height:32px;border-radius:8px;background:rgba(10,132,255,.1);border:1px solid rgba(10,132,255,.2);color:var(--blue);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:2px}
/* finalize btn */
.finalize-btn{width:100%;padding:16px;border-radius:14px;font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;margin-bottom:16px;border:none;letter-spacing:.3px}
.finalize-btn.ready{background:linear-gradient(135deg,#30D158,#00A86B);color:#fff;box-shadow:0 4px 20px rgba(48,209,88,.3)}
.finalize-btn.done{background:rgba(48,209,88,.12);border:1.5px solid rgba(48,209,88,.3);color:var(--green)}
.finalize-btn.incomplete{background:rgba(255,140,66,.08);border:1.5px dashed rgba(255,140,66,.3);color:var(--orange)}
/* programme month badge */
.prog-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;font-size:10px;font-weight:800;background:rgba(191,90,242,.12);color:var(--purple);border:1px solid rgba(191,90,242,.2);margin-bottom:12px}
</style>
</head>

// ── UTILS ──
const h=React.createElement;
const {useState,useEffect,useRef,useMemo,useCallback}=React;
function ls(k,d=null){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function getDow(){return new Date().getDay();}
function getWeekNum(){const d=new Date();const d2=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=d2.getUTCDay()||7;d2.setUTCDate(d2.getUTCDate()+4-day);const y=new Date(Date.UTC(d2.getUTCFullYear(),0,1));return Math.ceil((((d2-y)/86400000)+1)/7);}
function hexToRgb(hex){return`${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;}
function getSugIdx(mk){const wk=getWeekNum();const ky=`exIdx_${mk}`;const wky=`exWk_${mk}`;const sw=parseInt(localStorage.getItem(wky)||"0");const exs=LIB[mk]?.exercises||[];const cnt=exs.length;if(!cnt)return 0;if(sw!==wk){const l=parseInt(localStorage.getItem(ky)||"0");const n=(l+1)%cnt;localStorage.setItem(ky,String(n));localStorage.setItem(wky,String(wk));return n;}return parseInt(localStorage.getItem(ky)||"0");}
function getDayKey(idx){const dow=getDow();const todayIdx=dow===0?6:dow-1;const d=new Date();if(idx===todayIdx)return`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}-P${getProgPhase()}-${getDAYS()[idx].key}`;return`wk${getWeekNum()}-P${getProgPhase()}-${getDAYS()[idx].key}`;}
function computePct(day,dk){if(!day.groups)return null;let total=0,done=0;const extra=ls(`extra_${dk}`,[]);[...day.groups,...extra].forEach(g=>{const sets=ls(`series_${dk}_${g.id}`,Array.from({length:g.sets},()=>({done:false})));total+=sets.length;done+=sets.filter(s=>s.done).length;});return total>0?Math.round(done/total*100):0;}
function computeCals(day,dk){let c=0;const extra=ls(`extra_${dk}`,[]);[...(day.groups||[]),...extra].forEach(g=>{const sIdx=ls(`variant_${dk}_${g.id}`,0);const ex=LIB[g.muscle]?.exercises[sIdx]||LIB[g.muscle]?.exercises[0]||{cals:0};ls(`series_${dk}_${g.id}`,[]).filter(s=>s.done).forEach(s=>{c+=ex.cals*parseInt(s.reps||10)/10;});});if(day.run&&ls(`run_done_${dk}`,false)){c+=day.run.calsBurn;}return Math.round(c);}

function ProgressRing({pct,color="#FF3B5C",size=100}){const R=43;const C=2*Math.PI*R;const fill=C*(1-pct/100);return h("svg",{width:size,height:size,viewBox:"0 0 100 100",style:{transform:"rotate(-90deg)"}},h("circle",{cx:50,cy:50,r:R,fill:"none",stroke:"#1E2740",strokeWidth:8}),h("circle",{cx:50,cy:50,r:R,fill:"none",stroke:color,strokeWidth:8,strokeDasharray:C,strokeDashoffset:fill,strokeLinecap:"round",style:{transition:"stroke-dashoffset .5s ease"}}));}
function Toast({msg,show}){return h("div",{className:`toast ${show?"show":""}`},msg);}

// ── TIMER OVERLAY (plein écran) ──
function TimerOverlay({sec,onClose}){
  const [left,setLeft]=useState(sec);
  const [running,setRunning]=useState(true);
  const [adj,setAdj]=useState(sec);
  const ref=useRef(null);
  const done=left<=0;
  const pct=Math.max(0,left/adj*100);
  const R=110;const C=2*Math.PI*R;const fill=C*(1-pct/100);

  useEffect(()=>{
    if(running&&!done){
      ref.current=setInterval(()=>{
        setLeft(p=>{
          if(p<=1){clearInterval(ref.current);setRunning(false);if(navigator.vibrate)navigator.vibrate([300,150,300,150,300]);return 0;}
          return p-1;
        });
      },1000);
    } else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[running,done]);

  const mins=Math.floor(left/60).toString().padStart(2,"0");
  const secs=(left%60).toString().padStart(2,"0");

  function addTime(s){
    const newAdj=adj+s;
    setAdj(newAdj);
    setLeft(p=>Math.max(0,p+s));
    if(done&&s>0)setRunning(true);
  }

  return h("div",{className:"timer-overlay"},
    h("div",{className:"timer-overlay-arc"},
      h("svg",{width:260,height:260,viewBox:"0 0 260 260"},
        h("circle",{cx:130,cy:130,r:R,fill:"none",stroke:"#1E2740",strokeWidth:12}),
        h("circle",{cx:130,cy:130,r:R,fill:"none",stroke:done?"#30D158":running?"#FF8C42":"#0A84FF",strokeWidth:12,strokeDasharray:C,strokeDashoffset:fill,strokeLinecap:"round",style:{transition:"stroke-dashoffset .5s",transform:"rotate(-90deg)",transformOrigin:"130px 130px"}})
      ),
      h("div",{className:"timer-overlay-text"},
        h("div",{className:`timer-overlay-display ${done?"done":running?"running":""}`,style:{fontSize:"80px",fontWeight:900,fontVariantNumeric:"tabular-nums"}},done?"✓":`${mins}:${secs}`),
        h("div",{style:{fontSize:13,color:"var(--dim)",fontWeight:700,letterSpacing:".5px",marginTop:4}},done?"Repos terminé !":running?"Repos en cours…":"En pause")
      )
    ),
    h("div",{className:"timer-btns-row"},
      h("button",{className:"timer-small-btn",onClick:()=>addTime(-15),style:{fontSize:12}},"-15s"),
      done
        ?h("button",{className:"timer-big-btn",onClick:onClose,style:{background:"#30D158",color:"#000",minWidth:120}},"Reprendre 💪")
        :running
          ?h("button",{className:"timer-big-btn",onClick:()=>setRunning(false),style:{background:"#FF8C42",color:"#000",minWidth:120}},"Pause ⏸")
          :h("button",{className:"timer-big-btn",onClick:()=>setRunning(true),style:{background:"#0A84FF",color:"#fff",minWidth:120}},"Reprendre ▶"),
      h("button",{className:"timer-small-btn",onClick:()=>addTime(15),style:{fontSize:12}},"+15s")
    ),
    h("button",{onClick:onClose,style:{background:"none",border:"none",color:"var(--dim2)",fontSize:13,fontWeight:700,cursor:"pointer",marginTop:8,padding:"12px 24px"}},"Fermer ×")
  );
}

function getExerciseImageUrls(exName){
  // D'abord chercher dans la base statique
  if(EX_IMAGES[exName])return EX_IMAGES[exName];
  // Sinon génération via wger API par nom normalisé
  const slug=exName.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[éèê]/g,"e").replace(/[àâ]/g,"a").replace(/[ùû]/g,"u").replace(/[îï]/g,"i").replace(/[ôö]/g,"o")
    .replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");
  return [
    `https://wger.de/static/images/exercises/cache/200x200/small_${slug}.png`
  ];
}

      h("button",{className:`expand-btn ${open?"open":""}`,onClick:()=>setOpen(p=>!p)},"⌄")

          h("span",`${reps} reps · repos ${rest}s`),

        ),
        sets.map((s,i)=>h("div",{className:"series-row",key:i},
          h("span",{className:"serie-num"},i+1),
          h("div",{className:"serie-input-wrap"},
            h("input",{className:"serie-input",placeholder:"reps",value:s.reps,inputMode:"numeric",onChange:e=>{const ns=[...sets];ns[i]={...ns[i],reps:e.target.value};setSets(ns);}}),

    )
  );
}

// ── TAB SÉANCE ──
function TabSeance(){
  const DAYS=getDAYS();
  const prog=getProgram();
  const todayDow=getDow();const todayIdx=todayDow===0?6:todayDow-1;
  const [selDay,setSelDay]=useState(todayIdx);
  const [whoopScore,setWhoopScore]=useState(()=>ls("whoop_today",67));
  const [toast,setToast]=useState({msg:"",show:false});
  const [runDone,setRunDone]=useState(false);
  const [extraGroups,setExtraGroups]=useState([]);
  const [runDuration,setRunDuration]=useState(0);
  const [runDist,setRunDist]=useState("");
  const [timerOverlay,setTimerOverlay]=useState(null);
  const [seanceSaved,setSeanceSaved]=useState(false);
  // Apple Watch
  const [watchFcMoy,setWatchFcMoy]=useState(()=>ls("watch_fc_moy",""));
  const [watchFcMax,setWatchFcMax]=useState(()=>ls("watch_fc_max",""));
  const [watchCals,setWatchCals]=useState(()=>ls("watch_cals",""));
  const [watchHrv,setWatchHrv]=useState(()=>ls("watch_hrv",""));
  const [watchDuree,setWatchDuree]=useState(()=>ls("watch_duree",""));

  const day=DAYS[selDay];
  const dk=useMemo(()=>getDayKey(selDay),[selDay]);

  useEffect(()=>{
    setRunDone(ls(`run_done_${dk}`,false));
    setExtraGroups(ls(`extra_${dk}`,[]).filter(g=>g.removable));
    setRunDuration(ls(`run_dur_${dk}`,day.run?.duration||0));
    setRunDist(ls(`run_dist_${dk}`,""));
    setSeanceSaved(ls(`seance_saved_${dk}`,false));
    setWatchFcMoy(ls(`watch_fc_moy_${dk}`,""));
    setWatchFcMax(ls(`watch_fc_max_${dk}`,""));
    setWatchCals(ls(`watch_cals_${dk}`,""));
    setWatchHrv(ls(`watch_hrv_${dk}`,""));
    setWatchDuree(ls(`watch_duree_${dk}`,""));
  },[dk]);

  function saveWatch(field,val,setter){
    setter(val);
    lsSet(`watch_${field}_${dk}`,val);
    // Sync HRV → Whoop score auto
    if(field==="hrv"&&val){
      const hrv=parseInt(val);
      if(hrv>0){
        // HRV : <20=rouge, 20-50=orange, >50=vert (approximation)
        const score=Math.min(100,Math.round(hrv*1.8));
        setWhoopScore(score);lsSet("whoop_today",score);
      }
    }
  }

  function showToast(msg){setToast({msg,show:true});setTimeout(()=>setToast(p=>({...p,show:false})),2200);}
  function removeExtra(id){const upd=extraGroups.filter(g=>g.id!==id);setExtraGroups(upd);lsSet(`extra_${dk}`,upd);}
  function startTimer(sec){setTimerOverlay(sec);}

  const pct=day.type==="rest"?null:computePct(day,dk);
  const cals=computeCals(day,dk);
  const allGroups=[...(day.groups||[]),...extraGroups];
  const totalSets=allGroups.reduce((a,g)=>a+(ls(`series_${dk}_${g.id}`,[{},{},{}]).length),0);

  const whoopColor=whoopScore>=67?"#30D158":whoopScore>=33?"#FF8C42":"#FF3B5C";
  const whoopTxt=whoopScore>=67?"Feu vert 💪":whoopScore>=33?"Modéré ⚡":"Récup. 😴";

  // Finaliser la séance
  function finaliserSeance(){
    const now=new Date();
    const record={
      date:now.toISOString(),
      dateStr:now.toLocaleDateString("fr-FR"),
      dayKey:dk,
      dayTitle:day.title,
      pct:pct||0,
      cals,
      whoopScore,
      totalSets,
      doneSets:allGroups.reduce((a,g)=>a+(ls(`series_${dk}_${g.id}`,[]).filter(s=>s.done).length),0),
      exercises:allGroups.map(g=>{
        const sIdx=ls(`variant_${dk}_${g.id}`,0);
        const ex=LIB[g.muscle]?.exercises[sIdx]||LIB[g.muscle]?.exercises[0]||{name:"?"};
        const sets=ls(`series_${dk}_${g.id}`,[]);
        return{muscle:LIB[g.muscle]?.label||g.muscle,name:ex.name,sets:sets.map(s=>({reps:s.reps,kg:s.kg,done:s.done}))};
      }),
      run:day.run&&runDone?{duration:runDuration,dist:runDist}:null,
      watch:{fcMoy:watchFcMoy,fcMax:watchFcMax,cals:watchCals,hrv:watchHrv,duree:watchDuree},
      prog:prog.name
    };
    // Stocker dans historique
    const hist=ls("seance_history",[]);
    // Supprimer doublon du même dk
    const filtered=hist.filter(r=>r.dayKey!==dk);
    filtered.unshift(record);
    lsSet("seance_history",filtered.slice(0,200));
    lsSet(`seance_saved_${dk}`,true);
    setSeanceSaved(true);
    showToast("Séance enregistrée ✓");
  }

  const finalizeBtnClass=seanceSaved?"finalize-btn done":pct>=80?"finalize-btn ready":"finalize-btn incomplete";
  const finalizeBtnLabel=seanceSaved?"✓ Séance enregistrée":pct>=80?"💾 Finaliser la séance":"💾 Enregistrer (partiel)";

  return h("div",{className:"page safe-bot"},
    // Timer overlay
    timerOverlay&&h(TimerOverlay,{sec:timerOverlay,onClose:()=>setTimerOverlay(null)}),

    // Programme badge
    h("div",{className:"prog-badge"},h("span",prog.label)," — ",prog.name," · ",h("span",{style:{color:"var(--dim)"}},prog.desc)),

    // Days scroll
    h("div",{className:"days-row"},DAYS.map((d,i)=>{
      const dkI=getDayKey(i);
      const isDone=computePct(d,dkI)===100||ls(`seance_saved_${dkI}`,false);
      return h("div",{key:d.key,className:`day-pill ${selDay===i?"active":""} ${i===todayIdx?"today":""} ${isDone&&d.type!=="rest"?"done-day":""}`,onClick:()=>setSelDay(i)},
        d.label+(i===todayIdx?" ·":"")
      );
    })),

    // Whoop
    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"🫀 Récupération"),h("span",{className:"badge",style:{background:`rgba(${hexToRgb(whoopColor)},.15)`,color:whoopColor}},whoopTxt)),
      h("input",{type:"range",min:0,max:100,value:whoopScore,onChange:e=>{const v=parseInt(e.target.value);setWhoopScore(v);lsSet("whoop_today",v);}}),
      h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"var(--dim)",marginTop:6,marginBottom:4}},h("span","0%"),h("span",{style:{color:whoopColor,fontWeight:800}},whoopScore+"%"),h("span","100%")),
      h("div",{style:{fontSize:"12px",color:"var(--dim)",fontStyle:"italic"}},whoopScore>=67?"Récupération optimale — envoie fort !":whoopScore>=33?"Volume normal — reste à l'écoute":"Réduis l'intensité aujourd'hui")
    ),

    day.type==="rest"
      ?h("div",{className:"rest-day"},h("div",{className:"icon"},"😴"),h("h2",null,"Repos Complet"),h("p",null,"Récupération active recommandée : marche légère, étirements, sommeil."))
      :h("div",null,
          // Progress card
          h("div",{className:"card"},
            h("div",{style:{display:"flex",alignItems:"center",gap:14}},
              h("div",{className:"progress-ring-container"},
                h(ProgressRing,{pct:pct||0,color:pct===100?"#30D158":"#FF3B5C"}),
                h("div",{className:"progress-label"},
                  h("span",{className:"progress-pct",style:{color:pct===100?"#30D158":"var(--txt)"}},pct||0+"%"),
                  h("span",{className:"progress-sub"},"fait")
                )
              ),
              h("div",{style:{flex:1}},
                h("div",{style:{fontSize:"15px",fontWeight:900,marginBottom:4}},day.title),
                h("div",{style:{fontSize:"12px",color:"var(--dim)",marginBottom:10}},day.note),
                h("div",{className:"stats-row",style:{marginBottom:0}},
                  h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:"var(--orange)"}},cals),h("div",{className:"stat-lbl"},"kcal")),
                  day.groups&&h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:"var(--blue)"}},totalSets),h("div",{className:"stat-lbl"},"séries"))
                )
              )
            )
          ),

          // Run section
          day.run&&h("div",{className:"run-card"},
            h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
              h("div",{style:{fontWeight:800,fontSize:14}},day.run.type==="morning"?"🌅 Course matinale":"🏃 Course"),
              h("span",{className:`badge ${runDone?"badge-green":"badge-orange"}`},runDone?"Terminé ✓":"À faire")
            ),

function GoalRing({pct,color,size=72,stroke=7,label,value,goal}){
  const R=(size-stroke*2)/2;const C=2*Math.PI*R;const fill=C*(1-Math.min(1,pct/100));
  const done=pct>=100;
  return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
    h("div",{style:{position:"relative",width:size,height:size}},
      h("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`,style:{transform:"rotate(-90deg)"}},
        h("circle",{cx:size/2,cy:size/2,r:R,fill:"none",stroke:"#1E2740",strokeWidth:stroke}),
        h("circle",{cx:size/2,cy:size/2,r:R,fill:"none",stroke:done?"#30D158":color,strokeWidth:stroke,strokeDasharray:C,strokeDashoffset:fill,strokeLinecap:"round",style:{transition:"stroke-dashoffset .6s ease"}})
      ),
      h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}},
        done?h("span",{style:{fontSize:18}},"✓"):h("span",{style:{fontSize:13,fontWeight:900,color:done?"#30D158":color}},Math.round(pct)+"%")
      )
    ),
    h("div",{style:{fontSize:10,fontWeight:800,color:"var(--dim)",textAlign:"center",lineHeight:1.3}},label),
    h("div",{style:{fontSize:10,fontWeight:700,color:"var(--txt)"}},`${value}/${goal}`)
  );
}

function TabMensuel(){
  const DAYS=getDAYS();
  const now=new Date();const year=now.getFullYear();const month=now.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDow=(new Date(year,month,1).getDay()+6)%7;
  const todayDate=now.getDate();
  const wk=getWeekNum();

  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push({empty:true});
  const dayData=[];
  for(let d=1;d<=daysInMonth;d++){
    const dObj=new Date(year,month,d);const dow=(dObj.getDay()+6)%7;
    const dayDef=DAYS[dow];
    const dk2=`wk${wk}-P${getProgPhase()}-${dayDef.key}`;
    let status="future";
    const saved=ls(`seance_saved_${dk2}`,false);
    if(dayDef.type==="rest")status="rest";
    else if(d>todayDate)status="future";
    else if(saved)status="done";
    else{const p=computePct(dayDef,dk2);status=p===100?"done":p>0?"partial":"missed";}
    const cals=d<=todayDate?computeCals(dayDef,dk2):0;
    cells.push({d,status,isToday:d===todayDate,type:dayDef.type,cals});
    dayData.push({d,status,dow,type:dayDef.type,cals,dk:dk2,dayDef});
  }

  const pastDays=dayData.filter(d=>d.d<=todayDate);
  const doneDays=pastDays.filter(d=>d.status==="done").length;
  const partialDays=pastDays.filter(d=>d.status==="partial").length;
  const missedDays=pastDays.filter(d=>d.status==="missed"&&d.type!=="rest").length;
  const totalCals=pastDays.reduce((a,d)=>a+d.cals,0);
  const muscuDone=pastDays.filter(d=>d.status==="done"&&(d.type==="muscu"||d.type==="muscu+cardio")).length;
  const cardioDone=pastDays.filter(d=>d.status==="done"&&(d.type==="cardio"||d.type==="endurance")).length;

  let streak=0;
  for(let i=todayDate-1;i>=0;i--){
    const dd=dayData[i];if(!dd)break;
    if(dd.status==="done"||dd.status==="rest")streak++;else break;
  }

  const GOALS={muscu:12,cardio:8,cals:15000,total:20};
  const goalsData=[
    {label:"Muscu",value:muscuDone,goal:GOALS.muscu,color:"#FF3B5C"},
    {label:"Cardio",value:cardioDone,goal:GOALS.cardio,color:"#0A84FF"},
    {label:"Total",value:doneDays,goal:GOALS.total,color:"#30D158"},
    {label:"Kcal k",value:Math.round(totalCals/1000*10)/10,goal:Math.round(GOALS.cals/1000),color:"#FF8C42"},
  ];
  const monthName=now.toLocaleDateString("fr-FR",{month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase());
  const daysLeft=daysInMonth-todayDate;
  const completionPct=Math.round(doneDays/Math.max(1,pastDays.filter(d=>d.type!=="rest").length)*100);
  const prog=getProgram();

  // Historique récent
  const hist=ls("seance_history",[]).slice(0,5);

  return h("div",{className:"page safe-bot"},
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
      h("div",null,
        h("div",{style:{fontSize:"20px",fontWeight:900}},monthName),
        h("div",{style:{fontSize:"12px",color:"var(--dim)",marginTop:2}},`J${todayDate} · ${daysLeft}j restants · ${completionPct}% complété`)
      ),
      streak>0&&h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",background:"rgba(255,212,0,.1)",border:"1.5px solid rgba(255,212,0,.25)",borderRadius:12,padding:"8px 12px"}},
        h("div",{style:{fontSize:"22px",fontWeight:900,color:"#FFD60A"}},streak+"🔥"),
        h("div",{style:{fontSize:"9px",color:"var(--dim)",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}},"streak")
      )
    ),
    h("div",{className:"prog-badge",style:{marginBottom:12}},prog.label," — ",prog.name),
    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"🎯 Objectifs du mois")),
      h("div",{style:{display:"flex",justifyContent:"space-around",padding:"4px 0 8px"}},
        goalsData.map(g=>h(GoalRing,{key:g.label,pct:g.goal>0?g.value/g.goal*100:0,color:g.color,label:g.label,value:g.value,goal:g.goal}))
      ),
      h("div",{style:{marginTop:14}},
        goalsData.map(g=>h("div",{key:g.label,style:{marginBottom:10}},
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}},
            h("span",{style:{color:"var(--dim)",fontWeight:700}},g.label==="Kcal k"?"Calories brûlées":g.label==="Total"?"Séances complètes":g.label==="Muscu"?"Muscu complètes":"Cardio complètes"),
            h("span",{style:{color:g.value>=g.goal?"#30D158":"var(--dim)",fontWeight:800}},g.label==="Kcal k"?`${g.value}k/${g.goal}k`:`${g.value}/${g.goal}`)
          ),
          h("div",{style:{height:6,background:"var(--border)",borderRadius:3,overflow:"hidden"}},
            h("div",{style:{height:"100%",width:Math.min(100,g.goal>0?g.value/g.goal*100:0)+"%",background:g.value>=g.goal?"#30D158":g.color,borderRadius:3,transition:"width .6s ease"}})
          )
        ))
      )
    ),
    h("div",{className:"stats-row"},
      h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:"#FFD60A"}},streak+"🔥"),h("div",{className:"stat-lbl"},"Streak")),
      h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:"var(--red)"}},missedDays),h("div",{className:"stat-lbl"},"Manquées")),
      h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:"var(--purple)"}},partialDays),h("div",{className:"stat-lbl"},"Partielles")),
      h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:"var(--orange)"}},Math.round(totalCals/1000*10)/10+"k"),h("div",{className:"stat-lbl"},"kcal"))
    ),
    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"📅 Calendrier")),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8,textAlign:"center"}},
        ["L","M","M","J","V","S","D"].map((d,i)=>h("div",{key:i,style:{fontSize:"10px",color:"var(--dim2)",fontWeight:700,padding:4}},d))
      ),
      h("div",{className:"month-grid"},
        cells.map((c,i)=>c.empty
          ?h("div",{key:`e${i}`,className:"month-cell"})
          :h("div",{key:c.d,className:`month-cell ${c.status}`,style:{border:c.isToday?"2px solid var(--blue)":"none"}},c.d)
        )
      ),
      h("div",{style:{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}},
        [{s:"done",c:"#30D158",l:"Complet"},{s:"partial",c:"#FF8C42",l:"Partiel"},{s:"missed",c:"#FF3B5C",l:"Manqué"},{s:"rest",c:"#2A3040",l:"Repos"}].map(x=>
          h("div",{key:x.s,style:{display:"flex",alignItems:"center",gap:5,fontSize:11,color:x.c}},
            h("div",{style:{width:10,height:10,borderRadius:3,background:x.c,opacity:.8}}),x.l
          )
        )
      )
    ),
    hist.length>0&&h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"📋 Dernières séances")),
      hist.map((r,i)=>h("div",{key:i,style:{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<hist.length-1?"1px solid var(--border)":"none"}},
        h("div",{style:{width:40,height:40,borderRadius:10,background:`rgba(48,209,88,.12)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}},"✓"),
        h("div",{style:{flex:1,minWidth:0}},
          h("div",{style:{fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},r.dayTitle),
          h("div",{style:{fontSize:11,color:"var(--dim)",marginTop:2}},
            `${r.dateStr} · ${r.pct}% · ${r.cals} kcal`,
            r.watch&&r.watch.fcMoy&&h("span",{style:{color:"#FF3B5C",marginLeft:6}},"🫀 "+r.watch.fcMoy+" bpm"),
            r.watch&&r.watch.hrv&&h("span",{style:{color:"#BF5AF2",marginLeft:6}},"HRV "+r.watch.hrv),
            h("span",{style:{color:"var(--dim2)",marginLeft:6}},r.prog)
          )
        )
      ))
    ),

    // ── SAISIE MANUELLE D'UNE SÉANCE PASSÉE ──
    h(ManualSessionPanel,null)
  );
}

function ManualSessionPanel(){
  const [open,setOpen]=useState(false);
  const [saved,setSaved]=useState(false);
  const [dateStr,setDateStr]=useState(()=>{
    const y=new Date();y.setDate(y.getDate()-1);
    return y.toISOString().split("T")[0];
  });
  const [title,setTitle]=useState("Push — Pecs / Épaules / Triceps");
  const [pct,setPct]=useState(100);
  const [cals,setCals]=useState(132);
  const [rows,setRows]=useState([
    {muscle:"Pecs Haut",name:"Développé incliné haltères",sets:3,done:3},
    {muscle:"Pecs Central",name:"Développé couché barre",sets:3,done:3},
    {muscle:"Épaules",name:"Machine épaules",sets:3,done:3},
    {muscle:"Triceps",name:"Poulie triceps corde",sets:3,done:3},
    {muscle:"Pecs Haut",name:"Pec deck incliné",sets:3,done:3},
    {muscle:"Pecs Central",name:"Câble fly croisé",sets:3,done:3},
    {muscle:"Épaules",name:"Oiseau haltères",sets:3,done:3},
  ]);

  function addRow(){setRows(p=>[...p,{muscle:"",name:"",sets:3,done:3}]);}
  function removeRow(i){setRows(p=>p.filter((_,j)=>j!==i));}
  function updateRow(i,field,val){setRows(p=>{const n=[...p];n[i]={...n[i],[field]:val};return n;});}

  function saveSession(){
    const d=new Date(dateStr+"T12:00:00");
    const prog=getProgram();
    // Construire une clé unique basée sur la date
    const dk=`manual_${dateStr}`;
    const record={
      date:d.toISOString(),
      dateStr:d.toLocaleDateString("fr-FR"),
      dayKey:dk,
      dayTitle:title,
      pct:parseInt(pct)||100,
      cals:parseInt(cals)||0,
      whoopScore:ls("whoop_today",67),
      totalSets:rows.reduce((a,r)=>a+r.sets,0),
      doneSets:rows.reduce((a,r)=>a+r.done,0),
      exercises:rows.map(r=>({muscle:r.muscle,name:r.name,sets:Array.from({length:r.done},()=>({reps:10,kg:"",done:true}))})),
      run:null,
      prog:prog.name,
      manual:true
    };
    // Marquer le jour comme sauvegardé dans le calendrier
    lsSet(`seance_saved_${dk}`,true);
    // Ajouter à l'historique
    const hist=ls("seance_history",[]);
    const filtered=hist.filter(r=>r.dayKey!==dk);
    filtered.unshift(record);
    lsSet("seance_history",filtered.slice(0,200));
    setSaved(true);
    setTimeout(()=>{setOpen(false);setSaved(false);},1500);
  }

  if(!open)return h("div",{className:"card",style:{marginTop:8}},
    h("button",{onClick:()=>setOpen(true),style:{width:"100%",padding:"14px",background:"rgba(191,90,242,.08)",border:"1.5px dashed rgba(191,90,242,.3)",borderRadius:12,color:"var(--purple)",fontWeight:800,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}},
      "✏️ Saisir une séance passée manuellement"
    )
  );

  return h("div",{className:"card",style:{marginTop:8}},
    h("div",{className:"card-header"},
      h("span",{className:"card-title"},"✏️ Saisie manuelle"),
      h("button",{onClick:()=>setOpen(false),style:{background:"none",color:"var(--dim)",fontSize:20,cursor:"pointer",padding:"4px 8px"}},"×")
    ),

    // Date + titre
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}},
      h("div",null,
        h("div",{style:{fontSize:10,color:"var(--dim)",fontWeight:700,marginBottom:5}},"DATE"),
        h("input",{type:"date",className:"serie-input",value:dateStr,onChange:e=>setDateStr(e.target.value)})
      ),
      h("div",null,
        h("div",{style:{fontSize:10,color:"var(--dim)",fontWeight:700,marginBottom:5}},"COMPLÉTION"),
        h("input",{className:"serie-input",value:pct,inputMode:"numeric",onChange:e=>setPct(e.target.value),placeholder:"100"})
      )
    ),
    h("div",{style:{marginBottom:12}},
      h("div",{style:{fontSize:10,color:"var(--dim)",fontWeight:700,marginBottom:5}},"TITRE DE LA SÉANCE"),
      h("input",{className:"serie-input",value:title,onChange:e=>setTitle(e.target.value),style:{width:"100%"}})
    ),
    h("div",{style:{marginBottom:12}},
      h("div",{style:{fontSize:10,color:"var(--dim)",fontWeight:700,marginBottom:5}},"CALORIES BRÛLÉES"),
      h("input",{className:"serie-input",value:cals,inputMode:"numeric",onChange:e=>setCals(e.target.value),placeholder:"132",style:{width:"100%"}})
    ),

    // Liste exercices
    h("div",{style:{fontSize:10,color:"var(--dim)",fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:".5px"}},"EXERCICES"),
    rows.map((r,i)=>h("div",{key:i,style:{display:"grid",gridTemplateColumns:"1fr 1.8fr auto auto",gap:6,marginBottom:8,alignItems:"center"}},
      h("input",{className:"serie-input",placeholder:"Muscle",value:r.muscle,onChange:e=>updateRow(i,"muscle",e.target.value),style:{fontSize:11}}),
      h("input",{className:"serie-input",placeholder:"Exercice",value:r.name,onChange:e=>updateRow(i,"name",e.target.value),style:{fontSize:11}}),
      h("input",{className:"serie-input",placeholder:"S",value:r.sets,inputMode:"numeric",onChange:e=>updateRow(i,"sets",parseInt(e.target.value)||3),style:{width:40,textAlign:"center",fontSize:11}}),
      h("button",{onClick:()=>removeRow(i),style:{width:32,height:36,background:"none",color:"var(--red)",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},"×")
    )),
    h("button",{onClick:addRow,style:{width:"100%",padding:"9px",marginBottom:14,background:"rgba(191,90,242,.06)",border:"1.5px dashed rgba(191,90,242,.25)",borderRadius:8,color:"var(--purple)",fontWeight:700,fontSize:12,cursor:"pointer"}},"+ Ajouter un exercice"),

    saved
      ?h("div",{style:{padding:"14px",background:"rgba(48,209,88,.12)",border:"1.5px solid rgba(48,209,88,.3)",borderRadius:12,color:"var(--green)",fontWeight:800,fontSize:14,textAlign:"center"}},"✓ Séance enregistrée !")
      :h("button",{onClick:saveSession,style:{width:"100%",padding:"14px",background:"linear-gradient(135deg,rgba(48,209,88,.2),rgba(48,209,88,.08))",border:"1.5px solid rgba(48,209,88,.4)",borderRadius:12,color:"var(--green)",fontWeight:900,fontSize:15,cursor:"pointer"}},
        "💾 Enregistrer cette séance"
      )
  );
}

// ── TAB HEALTH ──
function TabHealth(){
  const [age,setAge]=useState(()=>ls("age",46));
  const fcmax=220-age;
  const fileRef=useRef(null);
  const [importMsg,setImportMsg]=useState("");
  function updateAge(v){const a=parseInt(v)||46;setAge(a);lsSet("age",a);}

  function exportData(){
    const data={};
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);try{data[k]=JSON.parse(localStorage.getItem(k));}catch{data[k]=localStorage.getItem(k);}}
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    const d=new Date();a.download=`workout-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.json`;
    a.click();URL.revokeObjectURL(url);
  }
  function importData(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);let count=0;
        Object.entries(data).forEach(([k,v])=>{localStorage.setItem(k,typeof v==="string"?v:JSON.stringify(v));count++;});
        setImportMsg(`✓ ${count} entrées restaurées !`);
        setTimeout(()=>window.location.reload(),1200);
      }catch{setImportMsg("❌ Fichier invalide.");}
    };reader.readAsText(file);
  }

  const zones=[
    {z:1,name:"Z1 Récupération",range:"<60%",bpm:`<${Math.round(fcmax*.6)}`,color:"#4A5568",desc:"Marche légère, récupération active"},
    {z:2,name:"Z2 Endurance",range:"60–70%",bpm:`${Math.round(fcmax*.6)}–${Math.round(fcmax*.7)}`,color:"#30D158",desc:"Cardio de base, combustion lipides, Zone 2"},
    {z:3,name:"Z3 Aérobie",range:"70–80%",bpm:`${Math.round(fcmax*.7)}–${Math.round(fcmax*.8)}`,color:"#0A84FF",desc:"Amélioration VO2max, seuil aérobie"},
    {z:4,name:"Z4 Seuil lactique",range:"80–90%",bpm:`${Math.round(fcmax*.8)}–${Math.round(fcmax*.9)}`,color:"#FF8C42",desc:"HIIT, fractionné, résistance anaérobie"},
    {z:5,name:"Z5 Maximum",range:"90–100%",bpm:`${Math.round(fcmax*.9)}+`,color:"#FF3B5C",desc:"Sprint, effort maximal, très court"},
  ];
  const prog=getProgram();
  const phase=getProgPhase();
  const phaseNames=["Janv–Avril","Fév–Mai","Mar–Juin"];
  return h("div",{className:"page safe-bot"},
    h("div",{style:{fontSize:"20px",fontWeight:900,marginBottom:16}},"❤️ Zones & Paramètres"),

    // Backup card
    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"💾 Sauvegarde")),
      h("div",{style:{fontSize:12,color:"var(--dim)",marginBottom:12,lineHeight:1.5}},"Exporte toutes tes données avant de mettre à jour l'app."),
      h("button",{onClick:exportData,style:{width:"100%",padding:"13px",marginBottom:8,background:"rgba(48,209,88,.1)",border:"1.5px solid rgba(48,209,88,.3)",borderRadius:12,color:"var(--green)",fontWeight:800,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}},"⬇️ Exporter mes données (JSON)"),
      h("input",{type:"file",accept:".json",ref:fileRef,style:{display:"none"},onChange:importData}),
      h("button",{onClick:()=>fileRef.current&&fileRef.current.click(),style:{width:"100%",padding:"13px",background:"rgba(10,132,255,.08)",border:"1.5px solid rgba(10,132,255,.2)",borderRadius:12,color:"var(--blue)",fontWeight:800,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}},"⬆️ Importer un backup"),
      importMsg&&h("div",{style:{marginTop:8,padding:"10px",background:"rgba(48,209,88,.1)",borderRadius:8,fontSize:13,fontWeight:700,color:"var(--green)",textAlign:"center"}},importMsg)
    ),

    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"📅 Programme actif")),
      h("div",{style:{padding:"4px 0 8px"}},
        PROGRAMS.map((p,i)=>h("div",{key:i,style:{display:"flex",alignItems:"center",gap:12,padding:"12px",background:i===phase?"rgba(255,59,92,.06)":"transparent",borderRadius:10,border:i===phase?`1px solid rgba(${hexToRgb(p.color)},.25)`:"1px solid transparent",marginBottom:6}},
          h("div",{style:{width:8,height:8,borderRadius:"50%",background:p.color,flexShrink:0}}),
          h("div",{style:{flex:1}},
            h("div",{style:{fontSize:13,fontWeight:800,color:i===phase?p.color:"var(--dim)"}},p.label+" — "+p.name),
            h("div",{style:{fontSize:11,color:"var(--dim)",marginTop:2}},p.desc)
          ),
          i===phase&&h("span",{style:{fontSize:10,background:`rgba(${hexToRgb(p.color)},.15)`,color:p.color,padding:"3px 8px",borderRadius:6,fontWeight:800}},"ACTIF")
        ))
      )
    ),
    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"⚙️ Paramètres")),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        h("div",null,
          h("div",{style:{fontSize:"11px",color:"var(--dim)",fontWeight:700,marginBottom:6}},"TON ÂGE"),
          h("input",{className:"serie-input",value:age,inputMode:"numeric",onChange:e=>updateAge(e.target.value)})
        ),
        h("div",null,
          h("div",{style:{fontSize:"11px",color:"var(--dim)",fontWeight:700,marginBottom:6}},"FC MAX"),
          h("div",{className:"serie-input",style:{display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,59,92,.1)",borderColor:"rgba(255,59,92,.3)",color:"var(--red)",fontWeight:900}},fcmax+" bpm")
        )
      )
    ),
    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"💓 Zones FC")),
      zones.map(z=>h("div",{key:z.z,style:{marginBottom:10}},
        h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:`rgba(${hexToRgb(z.color)},.06)`,borderRadius:10,border:`1px solid rgba(${hexToRgb(z.color)},.12)`}},
          h("div",{style:{width:34,height:34,borderRadius:8,background:`rgba(${hexToRgb(z.color)},.2)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:z.color,flexShrink:0}},"Z"+z.z),
          h("div",{style:{flex:1}},
            h("div",{style:{fontSize:"13px",fontWeight:800,color:z.color}},z.name),
            h("div",{style:{fontSize:"11px",color:"var(--dim)",marginTop:2}},z.desc)
          ),
          h("div",{style:{textAlign:"right",flexShrink:0}},
            h("div",{style:{fontSize:"12px",fontWeight:700,color:z.color}},z.bpm),
            h("div",{style:{fontSize:"10px",color:"var(--dim)"}},z.range)
          )
        )
      ))
    )
  );
}

// ── APP ──
function App(){
  const [tab,setTab]=useState(0);
  const tabs=[{l:"Séance",i:"🏋️"},{l:"Mensuel",i:"📅"},{l:"Health",i:"❤️"}];
  return h("div",{className:"app"},
    h("div",{className:"nav safe-top"},tabs.map((t,i)=>h("button",{key:i,className:`nav-btn ${tab===i?"active":""}`,onClick:()=>setTab(i)},h("span",{className:"icon"},t.i),t.l))),
    [h(TabSeance),h(TabMensuel),h(TabHealth)][tab]
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
