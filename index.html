<!DOCTYPE html>
<html lang="fr">
<head>

<title>Mon Programme Sport</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A0D14;--card:#111520;--card2:#161C2A;--border:#1E2740;--red:#FF3B5C;--orange:#FF8C42;--green:#30D158;--blue:#0A84FF;--purple:#BF5AF2;--yellow:#FFD60A;--teal:#5AC8FA;--txt:#E8ECF4;--dim:#8B95A8;--dim2:#4A5568;--radius:16px;--radius-sm:10px;}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
button,input,select{font-family:inherit;-webkit-tap-highlight-æÂcolor:transparent;border:none;outline:none}
::-webkit-scrollbar{display:none}
@supports(padding:max(0px)){.safe-bot{padding-bottom:max(20px,env(safe-area-inset-bottom))}.safe-top{padding-top:max(14px,env(safe-area-inset-top))}}
.app{display:flex;flex-direction:column;height:100%;overflow:hidden}
.nav{flex-shrink:0;display:flex;background:var(--card);border-bottom:1px solid var(--border)}
.nav-btn{flex:1;padding:14px 6px 10px;background:none;color:var(--dim);font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;transition:color .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.nav-btn .icon{font-size:20px}
.nav-btn.active{color:var(--red)}
.nav-btn.active .icon{filter:drop-shadow(0 0 6px var(--red))}
.page{flex:1;overflow-y:auto;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--dim)}
.days-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
.day-pill{flex-shrink:0;padding:8px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;color:var(--dim);cursor:pointer;transition:all .2s;white-space:nowrap}
.day-pill.active{border-color:var(--red);color:var(--red);background:rgba(255,59,92,.1)}
.day-pill.today{border-color:var(--blue)}
.day-pill.done-day{border-color:var(--green);color:var(--green)}
.progress-ring-container{position:relative;width:100px;height:100px;flex-shrink:0}
.progress-ring-container svg{transform:rotate(-90deg)}
.progress-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.progress-pct{font-size:26px;font-weight:900}
.progress-sub{font-size:9px;color:var(--dim);font-weight:600}
.exercise-block{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden}
.exercise-header{display:flex;align-items:center;gap:10px;padding:12px 14px}
.muscle-badge{font-size:9px;font-weight:800;letter-spacing:.4px;padding:3px 7px;border-radius:6px}
.exercise-name-wrap{flex:1;min-width:0}
.exercise-title{font-size:13px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exercise-cals{font-size:10px;color:var(--orange);font-weight:600}
.expand-btn{background:none;color:var(--dim);font-size:18px;padding:4px;cursor:pointer;transition:transform .2s;flex-shrink:0}
.expand-btn.open{transform:rotate(180deg)}
.variant-wrap{padding:0 14px 12px}
.variant-label{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.variant-select{width:100%;background:var(--bg);color:var(--txt);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-weight:600;cursor:pointer;appearance:none;-webkit-appearance:none}
.variant-select:focus{border-color:var(--red)}
.week-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--purple);font-weight:700;margin-top:6px}
.series-section{padding:0 14px 14px}
.series-label{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.series-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.serie-num{font-size:11px;color:var(--dim);font-weight:700;width:20px;text-align:center}
.serie-input-wrap{display:flex;gap:6px;flex:1}
.serie-input{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--txt);font-size:13px;font-weight:600;padding:8px 10px;width:100%;text-align:center}
.serie-input:focus{border-color:var(--red)}
.serie-check{width:32px;height:32px;border-radius:8px;background:var(--bg);border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0}
.serie-check.done{background:var(--green);border-color:var(--green)}
.series-controls{display:flex;gap:6px;margin-top:8px}
.ctrl-btn{flex:1;padding:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--dim);font-size:12px;font-weight:700;cursor:pointer}
.ctrl-btn.add{color:var(--green);border-color:rgba(48,209,88,.3)}
.ctrl-btn.rm{color:var(--red);border-color:rgba(255,59,92,.3)}
.add-ex-panel{background:rgba(191,90,242,.06);border:1.5px dashed rgba(191,90,242,.3);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px}
.add-ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stats-row{display:flex;gap:8px;margin-bottom:12px}
.stat-card{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-val{font-size:18px;font-weight:900}
.stat-lbl{font-size:9px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.timer-card{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px}
.timer-display{font-size:22px;font-weight:900;font-variant-numeric:tabular-nums;flex:1}
.timer-display.running{color:var(--orange)}
.timer-btn{width:36px;height:36px;border-radius:10px;background:var(--bg);border:1.5px solid var(--border);color:var(--txt);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.run-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800}
.badge-green{background:rgba(48,209,88,.15);color:var(--green)}
.badge-orange{background:rgba(255,140,66,.15);color:var(--orange)}
.section-title{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1E2740;border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.rest-day{text-align:center;padding:50px 20px}
.rest-day .icon{font-size:64px;margin-bottom:16px}
.rest-day h2{font-size:24px;font-weight:900;margin-bottom:8px}
.rest-day p{color:var(--dim);font-size:14px;line-height:1.5}
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:var(--border);outline:none;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--red);border:2px solid var(--bg);cursor:pointer}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.month-cell{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.month-cell.rest{background:rgba(139,149,168,.08);color:var(--dim2)}
.month-cell.done{background:rgba(48,209,88,.2);color:var(--green)}
.month-cell.partial{background:rgba(255,140,66,.2);color:var(--orange)}
.month-cell.missed{background:rgba(255,59,92,.12);color:var(--red)}
.month-cell.future{background:var(--card2);color:var(--dim2)}
</style>
</head>

<script>
if('serviceWorker'in navigator){const sw=`const C='wk-v7';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['/'])));self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/'))))});`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{})}

const LIB={
  pecs_upper:{label:"Pecs Haut",color:"#FF3B5C",exercises:[{id:"pu1",name:"Développé incliné haltères",type:"🏋️",cals:8},{id:"pu2",name:"Développé incliné barre",type:"🔩",cals:9},{id:"pu3",name:"Câble fly incliné",type:"⚙️",cals:7},{id:"pu4",name:"Pec deck incliné",type:"⚙️",cals:6},{id:"pu5",name:"Converging press incliné",type:"⚙️",cals:7},{id:"pu6",name:"Push-up incliné lesté",type:"💪",cals:5}]},
  pecs_mid:{label:"Pecs Central",color:"#FF3B5C",exercises:[{id:"pm1",name:"Développé couché haltères",type:"🏋️",cals:9},{id:"pm2",name:"Développé couché barre",type:"🔩",cals:10},{id:"pm3",name:"Câble fly croisé",type:"⚙️",cals:7},{id:"pm4",name:"Pec deck plat",type:"⚙️",cals:6},{id:"pm5",name:"Dips lestés pecs",type:"💪",cals:8},{id:"pm6",name:"Smith machine couché",type:"⚙️",cals:9}]},
  dos_large:{label:"Dos Largeur",color:"#0A84FF",exercises:[{id:"dl1",name:"Tractions pronation",type:"💪",cals:10},{id:"dl2",name:"Pulldown machine",type:"⚙️",cals:8},{id:"dl3",name:"Tirage poulie haute",type:"⚙️",cals:7},{id:"dl4",name:"Tractions supination",type:"💪",cals:9},{id:"dl5",name:"Pulldown câble neutre",type:"⚙️",cals:7},{id:"dl6",name:"Machine dorsaux conv.",type:"⚙️",cals:7}]},
  dos_ep:{label:"Dos Épaisseur",color:"#0A84FF",exercises:[{id:"de1",name:"Rowing haltère unilat.",type:"🏋️",cals:8},{id:"de2",name:"Rowing barre Yates",type:"🔩",cals:10},{id:"de3",name:"Rowing machine Hammer",type:"⚙️",cals:8},{id:"de4",name:"Soulevé roumain",type:"🔩",cals:11},{id:"de5",name:"Tirage horizontal câble",type:"⚙️",cals:7},{id:"de6",name:"T-bar rowing",type:"🔩",cals:9}]},
  biceps:{label:"Biceps",color:"#BF5AF2",exercises:[{id:"bi1",name:"Curl haltères alternés",type:"🏋️",cals:5},{id:"bi2",name:"Curl barre EZ",type:"🔩",cals:6},{id:"bi3",name:"Curl machine",type:"⚙️",cals:5},{id:"bi4",name:"Curl marteau haltères",type:"🏋️",cals:5},{id:"bi5",name:"Curl câble bas",type:"⚙️",cals:5},{id:"bi6",name:"Curl pupitre haltère",type:"🏋️",cals:5}]},
  triceps:{label:"Triceps",color:"#BF5AF2",exercises:[{id:"tr1",name:"Dips prise serrée",type:"💪",cals:7},{id:"tr2",name:"Poulie triceps corde",type:"⚙️",cals:5},{id:"tr3",name:"Skull crusher EZ",type:"🔩",cals:6},{id:"tr4",name:"Extension overhead halt.",type:"🏋️",cals:5},{id:"tr5",name:"Bench dips lestés",type:"💪",cals:6},{id:"tr6",name:"Kickback haltère",type:"🏋️",cals:4}]},
  epaules:{label:"Épaules",color:"#FF8C42",exercises:[{id:"ep1",name:"Développé militaire halt.",type:"🏋️",cals:8},{id:"ep2",name:"Développé militaire barre",type:"🔩",cals:9},{id:"ep3",name:"Élévations latérales",type:"🏋️",cals:5},{id:"ep4",name:"Oiseau haltères",type:"🏋️",cals:5},{id:"ep5",name:"Machine épaules",type:"⚙️",cals:7},{id:"ep6",name:"Arnold press",type:"🏋️",cals:7}]},
  jambes:{label:"Jambes / Quads",color:"#30D158",exercises:[{id:"jq1",name:"Squat barre",type:"🔩",cals:12},{id:"jq2",name:"Presse à cuisses",type:"⚙️",cals:10},{id:"jq3",name:"Leg extension",type:"⚙️",cals:7},{id:"jq4",name:"Fentes haltères",type:"🏋️",cals:9},{id:"jq5",name:"Hack squat machine",type:"⚙️",cals:11},{id:"jq6",name:"Bulgarian split squat",type:"🏋️",cals:10}]},
  isch:{label:"Ischio / Post.",color:"#30D158",exercises:[{id:"jp1",name:"Leg curl couché",type:"⚙️",cals:7},{id:"jp2",name:"Leg curl assis",type:"⚙️",cals:7},{id:"jp3",name:"Romanian deadlift",type:"🔩",cals:11},{id:"jp4",name:"Good morning",type:"🔩",cals:8},{id:"jp5",name:"Hip thrust haltère",type:"🏋️",cals:8}]},
  abdos:{label:"Abdominaux",color:"#FFD60A",exercises:[{id:"ab1",name:"Crunch poulie haute",type:"⚙️",cals:4},{id:"ab2",name:"Relevé jambes suspendu",type:"💪",cals:5},{id:"ab3",name:"Planche",type:"💪",cals:3},{id:"ab4",name:"Crunch obliques",type:"💪",cals:4},{id:"ab5",name:"Ab wheel rollout",type:"🏋️",cals:5}]}
};
const LIB_KEYS=Object.keys(LIB);

const DAYS=[
  {key:"lun",label:"Lun",short:"L",type:"muscu",title:"Push — Pecs / Épaules / Triceps",note:"Focus prise de masse pectorale",groups:[{id:"g1",muscle:"pecs_upper",sets:4,reps:"8–10",rest:90},{id:"g2",muscle:"pecs_mid",sets:4,reps:"8–10",rest:90},{id:"g3",muscle:"epaules",sets:3,reps:"10–12",rest:75},{id:"g4",muscle:"triceps",sets:3,reps:"10–12",rest:60}]},
  {key:"mar",label:"Mar",short:"M",type:"cardio",title:"Course Cardio",note:"Fractionné HIIT · 30–40 min",run:{type:"cardio",duration:35,calsBurn:380}},
  {key:"mer",label:"Mer",short:"M",type:"muscu",title:"Pull — Dos / Biceps",note:"Volume dos : largeur + épaisseur",groups:[{id:"g5",muscle:"dos_large",sets:4,reps:"8–10",rest:90},{id:"g6",muscle:"dos_ep",sets:4,reps:"8–10",rest:90},{id:"g7",muscle:"biceps",sets:3,reps:"10–12",rest:60}]},
  {key:"jeu",label:"Jeu",short:"J",type:"endurance",title:"Course Endurance",note:"Zone 2 · 45–60 min · allure confort",run:{type:"endurance",duration:55,calsBurn:480}},
  {key:"ven",label:"Ven",short:"V",type:"muscu+cardio",title:"Legs + Tapis matin/soir",note:"Course matin · Jambes soir",run:{type:"morning",duration:25,calsBurn:260},groups:[{id:"g8",muscle:"jambes",sets:4,reps:"8–10",rest:120},{id:"g9",muscle:"isch",sets:3,reps:"10–12",rest:90},{id:"g10",muscle:"abdos",sets:3,reps:"15–20",rest:45}]},
  {key:"sam",label:"Sam",short:"S",type:"muscu",title:"Push 2 — Pecs / Épaules / Bras",note:"2ème séance pecs · bras complets",groups:[{id:"g11",muscle:"pecs_upper",sets:3,reps:"10–12",rest:75},{id:"g12",muscle:"pecs_mid",sets:3,reps:"10–12",rest:75},{id:"g13",muscle:"epaules",sets:3,reps:"12–15",rest:60},{id:"g14",muscle:"biceps",sets:3,reps:"12–15",rest:60},{id:"g15",muscle:"triceps",sets:3,reps:"12–15",rest:60}]},
  {key:"dim",label:"Dim",short:"D",type:"rest",title:"Repos complet",note:"Récupération obligatoire 💤"}
];

const h=React.createElement;
const {useState,useEffect,useRef,useMemo}=React;
function ls(k,d=null){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function getDow(){return new Date().getDay();}
function getWeekNum(){const d=new Date();const d2=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=d2.getUTCDay()||7;d2.setUTCDate(d2.getUTCDate()+4-day);const y=new Date(Date.UTC(d2.getUTCFullYear(),0,1));return Math.ceil((((d2-y)/86400000)+1)/7);}
function hexToRgb(hex){return`${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;}
function getSugIdx(mk){const wk=getWeekNum();const ky=`exIdx_${mk}`;const wky=`exWk_${mk}`;const sw=parseInt(localStorage.getItem(wky)||"0");const exs=LIB[mk]?.exercises||[];const cnt=exs.length;if(!cnt)return 0;if(sw!==wk){const l=parseInt(localStorage.getItem(ky)||"0");const n=(l+1)%cnt;localStorage.setItem(ky,String(n));localStorage.setItem(wky,String(wk));return n;}return parseInt(localStorage.getItem(ky)||"0");}
function getDayKey(idx){const dow=getDow();const todayIdx=dow===0?6:dow-1;const d=new Date();if(idx===todayIdx)return`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}-${DAYS[idx].key}`;return`wk${getWeekNum()}-${DAYS[idx].key}`;}
function ProgressRing({pct,color="#FF3B5C",size=100}){const R=43;const C=2*Math.PI*R;const fill=C*(1-pct/100);return h("svg",{width:size,height:size,viewBox:"0 0 100 100",style:{transform:"rotate(-90deg)"}},h("circle",{cx:50,cy:50,r:R,fill:"none",stroke:"#1E2740",strokeWidth:8}),h("circle",{cx:50,cy:50,r:R,fill:"none",stroke:color,strokeWidth:8,strokeDasharray:C,strokeDashoffset:fill,strokeLinecap:"round",style:{transition:"stroke-dashoffset .5s ease"}}));}
function Toast({msg,show}){return h("div",{className:`toast ${show?"show":""}`},msg);}

function SeriesBlock({groupId,muscleKey,defaultSets,reps,rest,dk,removable,onRemove}){
  const lib=LIB[muscleKey]||{label:"?",color:"#FF3B5C",exercises:[]};
  const storKey=`series_${dk}_${groupId}`;const varKey=`variant_${dk}_${groupId}`;
  const sugIdx=getSugIdx(muscleKey);
  const [selIdx,setSelIdx]=useState(()=>{const s=ls(varKey,null);return s!=null?s:sugIdx;});
  const [sets,setSets]=useState(()=>ls(storKey,Array.from({length:defaultSets},()=>({reps:reps.split("–")[0]||"10",kg:"",done:false}))));
  const [open,setOpen]=useState(false);
  useEffect(()=>{lsSet(storKey,sets);},[sets,storKey]);
  useEffect(()=>{lsSet(varKey,selIdx);},[selIdx,varKey]);
  const selEx=lib.exercises[selIdx]||lib.exercises[0]||{name:"",type:"",cals:0};
  const doneSets=sets.filter(s=>s.done).length;const totalSets=sets.length;
  const calsEst=sets.filter(s=>s.done).reduce((a,s)=>a+(selEx.cals||0)*parseInt(s.reps||10)/10,0);
  const isSug=selIdx===sugIdx;
  return h("div",{className:"exercise-block"},
    h("div",{className:"exercise-header"},
      h("span",{className:"muscle-badge",style:{background:`rgba(${hexToRgb(lib.color)},.15)`,color:lib.color}},lib.label),
      h("div",{className:"exercise-name-wrap"},
        h("div",{className:"exercise-title"},selEx.type+" "+selEx.name),
        h("div",{className:"exercise-cals"},`~${Math.round(calsEst)} kcal · ${doneSets}/${totalSets} séries`)
      ),
      removable&&h("button",{onClick:onRemove,style:{background:"none",color:"var(--red)",fontSize:16,cursor:"pointer",padding:"4px",flexShrink:0}},"🗑"),
      h("button",{className:`expand-btn ${open?"open":""}`,onClick:()=>setOpen(p=>!p)},"⌄")
    ),
    open&&h("div",null,
      h("div",{className:"variant-wrap"},
        h("div",{className:"variant-label"},"Variante"),
        h("select",{className:"variant-select",value:selIdx,onChange:e=>setSelIdx(parseInt(e.target.value))},lib.exercises.map((ex,i)=>h("option",{key:ex.id,value:i},`${ex.type} ${ex.name}`))),
        isSug&&h("div",{className:"week-badge"},"✨ Suggestion S"+getWeekNum()+" · rotation auto")
      ),
      h("div",{className:"series-section"},
        h("div",{className:"series-label"},h("span",`${reps} reps · repos ${rest}s`),h("span",{style:{fontSize:10,color:"var(--dim)"}},`${doneSets}/${totalSets}`)),
        sets.map((s,i)=>h("div",{className:"series-row",key:i},
          h("span",{className:"serie-num"},i+1),

function computePct(day,dk){
  if(!day.groups)return null;
  let total=0,done=0;
  const extra=ls(`extra_${dk}`,[]);
  [...day.groups,...extra].forEach(g=>{const sets=ls(`series_${dk}_${g.id}`,Array.from({length:g.sets},()=>({done:false})));total+=sets.length;done+=sets.filter(s=>s.done).length;});
  return total>0?Math.round(done/total*100):0;
}
function computeCals(day,dk){
  let c=0;
  const extra=ls(`extra_${dk}`,[]);
  [...(day.groups||[]),...extra].forEach(g=>{const sIdx=ls(`variant_${dk}_${g.id}`,0);const ex=LIB[g.muscle]?.exercises[sIdx]||LIB[g.muscle]?.exercises[0]||{cals:0};ls(`series_${dk}_${g.id}`,[]).filter(s=>s.done).forEach(s=>{c+=ex.cals*parseInt(s.reps||10)/10;});});
  if(day.run&&ls(`run_done_${dk}`,false)){c+=day.run.calsBurn;}
  return Math.round(c);
}

function TabMensuel(){
  const now=new Date();const year=now.getFullYear();const month=now.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDow=(new Date(year,month,1).getDay()+6)%7;
  const todayDate=now.getDate();

  // Build all day cells with status
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push({empty:true});
  const dayData=[];
  for(let d=1;d<=daysInMonth;d++){
    const dObj=new Date(year,month,d);const dow=(dObj.getDay()+6)%7;
    const dayDef=DAYS[dow];const dk2=`wk${getWeekNum()}-${dayDef.key}`;
    let status="future";
    if(dayDef.type==="rest")status="rest";
    else if(d>todayDate)status="future";
    else{const p=computePct(dayDef,dk2);status=p===100?"done":p>0?"partial":"missed";}
    const cals=d<=todayDate?computeCals(dayDef,dk2):0;
    cells.push({d,status,isToday:d===todayDate,type:dayDef.type,cals});
    dayData.push({d,status,dow,type:dayDef.type,cals,dk:dk2,dayDef});
  }

  // Stats
  const pastDays=dayData.filter(d=>d.d<=todayDate);
  const doneDays=pastDays.filter(d=>d.status==="done").length;
  const partialDays=pastDays.filter(d=>d.status==="partial").length;
  const missedDays=pastDays.filter(d=>d.status==="missed"&&d.type!=="rest").length;
  const totalCals=pastDays.reduce((a,d)=>a+d.cals,0);
  const muscuDone=pastDays.filter(d=>d.status==="done"&&(d.type==="muscu"||d.type==="muscu+cardio")).length;
  const cardioDone=pastDays.filter(d=>d.status==="done"&&(d.type==="cardio"||d.type==="endurance")).length;

  // Streak
  let streak=0;
  for(let i=todayDate-1;i>=0;i--){
    const dd=dayData[i];if(!dd)break;
    if(dd.status==="done"||dd.status==="rest")streak++;
    else break;
  }

  // Best streak
  let bestStreak=0,cur=0;
  dayData.forEach(dd=>{
    if(dd.status==="done"||dd.status==="rest")cur++;
    else{bestStreak=Math.max(bestStreak,cur);cur=0;}
  });
  bestStreak=Math.max(bestStreak,cur);

  // Weekly bars (group by week)
  const weeks=[];
  let week=[];
  cells.filter(c=>!c.empty).forEach((c,i)=>{
    week.push({label:["L","M","M","J","V","S","D"][c.d?((new Date(year,month,c.d).getDay()+6)%7):i%7]||"",status:c.status||"future"});
    if(week.length===7||i===cells.filter(c=>!c.empty).length-1){weeks.push([...week]);week=[];}
  });

  // Goals
  const GOALS={muscu:12,cardio:8,cals:15000,total:20};
  const goalsData=[
    {label:"Muscu",value:muscuDone,goal:GOALS.muscu,color:"#FF3B5C"},
    {label:"Cardio",value:cardioDone,goal:GOALS.cardio,color:"#0A84FF"},
    {label:"Total",value:doneDays,goal:GOALS.total,color:"#30D158"},
    {label:"Kcal k",value:Math.round(totalCals/1000*10)/10,goal:Math.round(GOALS.cals/1000),color:"#FF8C42"},
  ];

  const monthName=now.toLocaleDateString("fr-FR",{month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase());
  const daysLeft=daysInMonth-todayDate;
  const completionPct=Math.round(doneDays/Math.max(1,pastDays.filter(d=>d.type!=="rest").length)*100);

  return h("div",{className:"page safe-bot"},

    // Header
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
      h("div",null,
        h("div",{style:{fontSize:"20px",fontWeight:900}},monthName),
        h("div",{style:{fontSize:"12px",color:"var(--dim)",marginTop:2}},`J${todayDate} · encore ${daysLeft} jour${daysLeft>1?"s":""} · ${completionPct}% de complétion`)
      ),
      streak>0&&h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",background:"rgba(255,212,0,.1)",border:"1.5px solid rgba(255,212,0,.25)",borderRadius:12,padding:"8px 12px"}},
        h("div",{style:{fontSize:"22px",fontWeight:900,color:"#FFD60A"}},streak+"🔥"),
        h("div",{style:{fontSize:"9px",color:"var(--dim)",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}},streak===1?"Jour":"Jours")
      )
    ),

    // 4 Goal rings
    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"🎯 Objectifs du mois")),
      h("div",{style:{display:"flex",justifyContent:"space-around",padding:"4px 0 8px"}},
        goalsData.map(g=>h(GoalRing,{key:g.label,pct:g.goal>0?g.value/g.goal*100:0,color:g.color,label:g.label,value:g.value,goal:g.goal}))
      ),
      // Progress bars below rings
      h("div",{style:{marginTop:14}},
        goalsData.map(g=>h("div",{key:g.label,style:{marginBottom:10}},
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}},
            h("span",{style:{color:"var(--dim)",fontWeight:700}},g.label==="Kcal k"?"Calories":g.label==="Total"?"Séances complètes":g.label==="Muscu"?"Séances muscu":"Séances cardio"),
            h("span",{style:{color:g.value>=g.goal?"#30D158":"var(--dim)",fontWeight:800}},
              g.label==="Kcal k"?`${g.value}k / ${g.goal}k`:`${g.value} / ${g.goal}`
            )
          ),
          h("div",{style:{height:6,background:"var(--border)",borderRadius:3,overflow:"hidden"}},
            h("div",{style:{height:"100%",width:Math.min(100,g.goal>0?g.value/g.goal*100:0)+"%",background:g.value>=g.goal?"#30D158":g.color,borderRadius:3,transition:"width .6s ease"}})
          )
        ))
      )
    ),

    // Streak + best
    h("div",{className:"stats-row"},
      h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:"#FFD60A"}},streak+"🔥"),h("div",{className:"stat-lbl"},"Streak actuel")),
      h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:"var(--orange)"}},bestStreak),h("div",{className:"stat-lbl"},"Meilleur streak")),
      h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:"var(--red)"}},missedDays),h("div",{className:"stat-lbl"},"Manquées")),
      h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:"var(--purple)"}},partialDays),h("div",{className:"stat-lbl"},"Partielles"))
    ),

    // Weekly activity bars
    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"📊 Activité par semaine")),
      h("div",{style:{display:"flex",gap:12,alignItems:"flex-end",overflowX:"auto",paddingBottom:4}},
        weeks.map((w,i)=>h(WeekBar,{key:i,weekDays:w,weekLabel:"S"+(i+1)}))
      ),
      h("div",{style:{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}},
        [{s:"done",c:"#30D158",l:"Complet"},{s:"partial",c:"#FF8C42",l:"Partiel"},{s:"missed",c:"#FF3B5C",l:"Manqué"},{s:"rest",c:"#2A3040",l:"Repos"}].map(x=>
          h("div",{key:x.s,style:{display:"flex",alignItems:"center",gap:5,fontSize:11,color:x.c}},
            h("div",{style:{width:10,height:10,borderRadius:3,background:x.c,opacity:.8}}),x.l
          )
        )
      )
    ),

    // Calendar
    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"📅 Calendrier")),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8,textAlign:"center"}},
        ["L","M","M","J","V","S","D"].map((d,i)=>h("div",{key:i,style:{fontSize:"10px",color:"var(--dim2)",fontWeight:700,padding:4}},d))
      ),
      h("div",{className:"month-grid"},
        cells.map((c,i)=>c.empty
          ?h("div",{key:`e${i}`,className:"month-cell"})
          :h("div",{key:c.d,className:`month-cell ${c.status}`,
              style:{border:c.isToday?"2px solid var(--blue)":"none",position:"relative"}},
            c.d,
            c.status==="done"&&h("div",{style:{position:"absolute",bottom:1,right:2,fontSize:7,opacity:.8}},"✓")
          )
        )
      )
    ),

    // Type breakdown donut-style
    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"💪 Répartition des séances")),
      h("div",{style:{display:"flex",gap:10}},
        [
          {label:"Muscu",count:muscuDone,total:pastDays.filter(d=>d.type==="muscu"||d.type==="muscu+cardio").length,color:"#FF3B5C",icon:"🏋️"},
          {label:"Cardio",count:cardioDone,total:pastDays.filter(d=>d.type==="cardio"||d.type==="endurance").length,color:"#0A84FF",icon:"🏃"},
          {label:"Complètes",count:doneDays,total:pastDays.filter(d=>d.type!=="rest").length,color:"#30D158",icon:"✅"},
        ].map(t=>h("div",{key:t.label,style:{flex:1,background:"var(--card2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"12px 10px",textAlign:"center"}},
          h("div",{style:{fontSize:22}}),
          h("div",{style:{fontSize:20,fontWeight:900,color:t.color}},t.count),
          h("div",{style:{fontSize:9,color:"var(--dim)",fontWeight:700,textTransform:"uppercase",letterSpacing:".4px",marginTop:2}},t.label),
          h("div",{style:{height:4,background:"var(--border)",borderRadius:2,overflow:"hidden",marginTop:6}},
            h("div",{style:{height:"100%",width:Math.round(t.count/Math.max(1,t.total)*100)+"%",background:t.color,borderRadius:2}})
          ),
          h("div",{style:{fontSize:10,color:"var(--dim)",marginTop:4}},`${t.count}/${t.total}`)
        ))
      )
    )
  );
}

function TabHealth(){
  const [age,setAge]=useState(()=>ls("age",46));
  const fcmax=220-age;
  function updateAge(v){const a=parseInt(v)||46;setAge(a);lsSet("age",a);lsSet("fcmax",220-a);}
  const zones=[
    {z:1,name:"Z1 Récupération",range:"<60%",bpm:`<${Math.round(fcmax*.6)}`,color:"#4A5568",desc:"Marche, récupération active"},
    {z:2,name:"Z2 Endurance",range:"60–70%",bpm:`${Math.round(fcmax*.6)}–${Math.round(fcmax*.7)}`,color:"#30D158",desc:"Cardio de base · brûlage lipides"},
    {z:3,name:"Z3 Aérobie",range:"70–80%",bpm:`${Math.round(fcmax*.7)}–${Math.round(fcmax*.8)}`,color:"#0A84FF",desc:"Amélioration VO2max"},
    {z:4,name:"Z4 Seuil",range:"80–90%",bpm:`${Math.round(fcmax*.8)}–${Math.round(fcmax*.9)}`,color:"#FF8C42",desc:"HIIT · fractionné"},
    {z:5,name:"Z5 Maximum",range:"90–100%",bpm:`${Math.round(fcmax*.9)}+`,color:"#FF3B5C",desc:"Sprint · effort maximal"},
  ];
  return h("div",{className:"page safe-bot"},
    h("div",{style:{fontSize:"20px",fontWeight:900,marginBottom:16}},"❤️ Zones d'entraînement"),
    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"⚙️ Paramètres personnels")),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        h("div",null,
          h("div",{style:{fontSize:"11px",color:"var(--dim)",fontWeight:700,marginBottom:6}},"TON ÂGE"),
          h("input",{className:"serie-input",value:age,inputMode:"numeric",onChange:e=>updateAge(e.target.value)})
        ),
        h("div",null,
          h("div",{style:{fontSize:"11px",color:"var(--dim)",fontWeight:700,marginBottom:6}},"FC MAX (220 − âge)"),
          h("div",{className:"serie-input",style:{display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,59,92,.1)",borderColor:"rgba(255,59,92,.3)",color:"var(--red)",fontWeight:900}},fcmax+" bpm")
        )
      )
    ),
    h("div",{className:"card"},
      h("div",{className:"card-header"},h("span",{className:"card-title"},"💓 Tes zones FC")),
      zones.map(z=>
        h("div",{key:z.z,style:{marginBottom:10}},
          h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:`rgba(${hexToRgb(z.color)},.06)`,borderRadius:10,border:`1px solid rgba(${hexToRgb(z.color)},.12)`}},
            h("div",{style:{width:34,height:34,borderRadius:8,background:`rgba(${hexToRgb(z.color)},.2)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:z.color,flexShrink:0}},"Z"+z.z),
            h("div",{style:{flex:1}},
              h("div",{style:{fontSize:"13px",fontWeight:800,color:z.color}},z.name),
              h("div",{style:{fontSize:"11px",color:"var(--dim)",marginTop:2}},z.desc)
            ),
            h("div",{style:{textAlign:"right",flexShrink:0}},
              h("div",{style:{fontSize:"12px",fontWeight:700,color:z.color}},z.bpm+" bpm"),
              h("div",{style:{fontSize:"10px",color:"var(--dim)"}},z.range)
            )
          ),
          h("div",{style:{height:4,background:"var(--border)",borderRadius:2,overflow:"hidden",margin:"4px 0 0"}},
            h("div",{style:{height:"100%",width:z.z*20+"%",background:z.color,opacity:.7,borderRadius:2}})
          )
        )
      )
    )
  );
}

function App(){
  const [tab,setTab]=useState(0);
  const tabs=[{l:"Séance",i:"🏋️"},{l:"Mensuel",i:"📅"},{l:"Health",i:"❤️"}];
  return h("div",{className:"app"},
    h("div",{className:"nav safe-top"},tabs.map((t,i)=>h("button",{key:i,className:`nav-btn ${tab===i?"active":""}`,onClick:()=>setTab(i)},h("span",{className:"icon"},t.i),t.l))),
    [h(TabSeance),h(TabMensuel),h(TabHealth)][tab]
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));

</script>
</body>
</html>
